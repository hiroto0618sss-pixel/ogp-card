<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>OGP Card Generator</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#f9f9f7;--surface:#fff;--border:#e8e8e4;--border2:#d0d0cc;--text:#1a1a18;--text2:#666660;--text3:#aaa;--accent:#0F6E56}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;background:var(--bg);color:var(--text);min-height:100vh;padding:0 0 60px}
header{border-bottom:1px solid var(--border);padding:18px 24px;display:flex;align-items:center;gap:10px;background:var(--surface)}
header .logo{width:28px;height:28px;background:var(--accent);border-radius:7px;display:flex;align-items:center;justify-content:center;color:#fff;font-size:14px;font-weight:700}
header h1{font-size:15px;font-weight:600}
header span{font-size:12px;color:var(--text2);margin-left:4px}
.container{max-width:840px;margin:0 auto;padding:32px 20px;display:grid;grid-template-columns:1fr 1fr;gap:24px;align-items:start}
@media(max-width:640px){.container{grid-template-columns:1fr}}
.panel{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:20px}
.panel-title{font-size:11px;font-weight:600;letter-spacing:.07em;text-transform:uppercase;color:var(--text3);margin-bottom:16px}
.field{margin-bottom:12px}
.field label{display:block;font-size:12px;color:var(--text2);margin-bottom:5px}
.field input,.field textarea{width:100%;font-family:inherit;font-size:13px;color:var(--text);background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:9px 11px;outline:none;transition:border-color .15s}
.field input:focus,.field textarea:focus{border-color:var(--accent)}
.field textarea{resize:vertical;min-height:70px;line-height:1.5}
.style-tabs{display:flex;gap:6px;margin-bottom:14px}
.stab{font-size:12px;padding:5px 12px;border-radius:99px;border:1px solid var(--border);background:transparent;color:var(--text2);cursor:pointer;transition:all .15s}
.stab.active{background:var(--accent);color:#fff;border-color:var(--accent)}
.color-row{display:flex;gap:8px;margin-bottom:16px;flex-wrap:wrap}
.chip{width:26px;height:26px;border-radius:50%;cursor:pointer;border:2px solid transparent;transition:transform .1s,border-color .15s}
.chip:hover{transform:scale(1.12)}
.chip.active{border-color:var(--text)}
.gen-btn{width:100%;padding:12px;font-family:inherit;font-size:14px;font-weight:600;color:#fff;background:var(--accent);border:none;border-radius:10px;cursor:pointer;margin-top:4px}
.gen-btn:hover{opacity:.88}
.gen-btn:disabled{opacity:.5;cursor:not-allowed}
.preview-bg{background:var(--bg);border:1px dashed var(--border2);border-radius:10px;padding:20px;display:flex;align-items:center;justify-content:center;min-height:160px;margin-bottom:16px}
.card-wrap{width:100%;max-width:420px;overflow:hidden;border-radius:12px;text-decoration:none;background:#fff;border:1px solid #e5e5e5;box-shadow:0 2px 8px rgba(0,0,0,.1);display:block;cursor:pointer}
.card-a{display:flex;flex-direction:row;height:110px}
.card-a .ci{width:130px;flex-shrink:0;object-fit:cover;height:100%}
.card-a .cb{flex:1;padding:12px 14px;display:flex;flex-direction:column;justify-content:center;gap:3px}
.card-b{display:flex;flex-direction:column}
.card-b .ci{width:100%;height:180px;object-fit:cover}
.card-b .cb{padding:12px 14px}
.card-c{position:relative;height:180px}
.card-c .ci{width:100%;height:100%;object-fit:cover;position:absolute;top:0;left:0}
.card-c .ov{position:absolute;bottom:0;left:0;right:0;background:linear-gradient(transparent,rgba(0,0,0,.75));padding:28px 14px 14px}
.ct{font-size:13px;font-weight:600;line-height:1.3;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.cd{font-size:11px;line-height:1.4;margin-top:3px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.cs{font-size:11px;margin-top:5px;display:flex;align-items:center;gap:4px}
.cdot{width:5px;height:5px;border-radius:50%;flex-shrink:0}
.result-box{display:none;background:#f0faf6;border:1px solid #b2e0d0;border-radius:10px;padding:14px 16px;margin-bottom:14px}
.result-box.show{display:block}
.result-label{font-size:11px;color:#0F6E56;font-weight:600;margin-bottom:6px}
.result-url{font-size:13px;word-break:break-all;color:#0F6E56;font-weight:500}
.copy-url-btn{margin-top:10px;width:100%;padding:9px;font-family:inherit;font-size:13px;font-weight:500;background:#0F6E56;color:#fff;border:none;border-radius:8px;cursor:pointer}
.error-box{display:none;background:#fff0f0;border:1px solid #f5bcbc;border-radius:10px;padding:12px 14px;font-size:13px;color:#c00;margin-bottom:12px}
.error-box.show{display:block}
</style>
</head>
<body>
<header>
  <div class="logo">C</div>
  <h1>OGP Card Generator</h1>
  <span>Xで綁麗なリンクカードを表示</span>
</header>
<div class="container">
  <div class="panel">
    <div class="panel-title">カード設定</div>
    <div class="field"><label>タイトル <span style="color:#c00">*</span></label><input id="ti" type="text" placeholder="記事タイトルを入力"/></div>
    <div class="field"><label>説明文</label><textarea id="de" placeholder="記事の簡単な説明（省略可）"></textarea></div>
    <div class="field"><label>リンク先URL <span style="color:#c00">*</span></label><input id="ur" type="text" placeholder="https://..."/></div>
    <div class="field"><label>OGP画像URL</label><input id="im" type="text" placeholder="https://... （1200x630px推奨）"/></div>
    <div class="field"><label>サイト名</label><input id="si" type="text" placeholder="ブログ名など（省略可）"/></div>
    <div style="margin-bottom:6px;font-size:12px;color:var(--text2)">カードスタイル</div>
    <div class="style-tabs">
      <button class="stab active" data-s="a" onclick="SS('a')">横並び</button>
      <button class="stab" data-s="b" onclick="SS('b')">縦積み</button>
      <button class="stab" data-s="c" onclick="SS('c')">オーバーレイ</button>
    </div>
    <div style="margin-bottom:6px;font-size:12px;color:var(--text2)">アクセントカラー</div>
    <div class="color-row" id="chips"></div>
    <button class="gen-btn" id="gb" onclick="GEN()">　URLを発行する</button>
  </div>
  <div class="panel">
    <div class="panel-title">プレビュー</div>
    <div class="preview-bg"><div id="pv"></div></div>
    <div class="error-box" id="eb"></div>
    <div class="result-box" id="rb">
      <div class="result-label">✓ カードURLが発行されました</div>
      <div class="result-url" id="ru"></div>
      <button class="copy-url-btn" onclick="CP()">URLをコピー</button>
    </div>
    <div style="font-size:12px;color:var(--text3);line-height:1.6">発行したURLをXのポスト・リプに貼るだけで、設定した画像・タイトルでカード表示されます。</div>
  </div>
</div>
<script>
var CL=[{h:"#0F6E56"},{h:"#185FA5"},{h:"#534AB7"},{h:"#993C1D"},{h:"#993556"},{h:"#854F0B"},{h:"#5F5E5A"}];
var CS="a",CC=CL[0];
function GV(){return{t:document.getElementById("ti").value.trim(),d:document.getElementById("de").value.trim(),u:document.getElementById("ur").value.trim(),i:document.getElementById("im").value.trim(),s:document.getElementById("si").value.trim()}}
function ES(s){return String(s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;")}
function RP(){
  var v=GV(),c=CC.h;
  var ie=v.i?'<img class="ci" src="'+v.i+'" alt=""/>':'<div class="ci" style="height:110px;background:'+c+'18"></div>';
  var se=v.s?'<div class="cs" style="color:'+c+'"><span class="cdot" style="background:'+c+'"></span>'+ES(v.s)+"</div>":"";
  var tc=CS==="c"?"#fff":"#1a1a1a",dc=CS==="c"?"rgba(255,255,255,.82)":"#666";
  var inn="";
  if(CS==="a") inn='<div class="card-a">'+ie+'<div class="cb"><div class="ct" style="color:'+tc+'">'+ES(v.t||"タイトル")+'</div><div class="cd" style="color:'+dc+'">'+ES(v.d)+"</div>"+se+"</div></div>";
  else if(CS==="b") inn='<div class="card-b">'+ie+'<div class="cb"><div class="ct" style="color:'+tc+'">'+ES(v.t||"タイトル")+'</div><div class="cd" style="color:'+dc+'">'+ES(v.d)+"</div>"+se+"</div></div>";
  else{var sc=v.s?'<div class="cs" style="color:rgba(255,255,255,.6)"><span class="cdot" style="background:rgba(255,255,255,.6)"></span>'+ES(v.s)+"</div>":"";inn='<div class="card-c">'+ie+'<div class="ov"><div class="ct" style="color:#fff">'+ES(v.t||"タイトル")+'</div><div class="cd" style="color:rgba(255,255,255,.82)">'+ES(v.d)+"</div>"+sc+"</div></div>"}
  document.getElementById("pv").innerHTML='<div class="card-wrap">'+inn+"</div>"
}
function SS(s){CS=s;document.querySelectorAll(".stab").forEach(function(t){t.classList.toggle("active",t.dataset.s===s)});RP()}
function BC(){var r=document.getElementById("chips");CL.forEach(function(c,i){var e=document.createElement("div");e.className="chip"+(i===0?" active":"");e.style.background=c.h;e.onclick=function(){CC=c;document.querySelectorAll(".chip").forEach(function(x,j){x.classList.toggle("active",j===i)});RP()};r.appendChild(e)})}
function GEN(){
  var v=GV();
  var eb=document.getElementById("eb");
  eb.className="error-box";
  if(!v.t){eb.textContent="タイトルを入力してください";eb.className="error-box show";return}
  if(!v.u){eb.textContent="リンク先URLを入力してください";eb.className="error-box show";return}
  var btn=document.getElementById("gb");
  btn.disabled=true;btn.textContent="発行中…";
  var xhr=new XMLHttpRequest();
  xhr.open("POST","/create");
  xhr.setRequestHeader("Content-Type","application/json");
  xhr.onload=function(){
    var j=JSON.parse(xhr.responseText);
    if(j.error){eb.textContent=j.error;eb.className="error-box show"}
    else{document.getElementById("ru").textContent=j.cardUrl;document.getElementById("rb").className="result-box show";eb.className="error-box"}
    btn.disabled=false;btn.textContent="URLを発行する"
  };
  xhr.onerror=function(){eb.textContent="ネットワークエラー";eb.className="error-box show";btn.disabled=false;btn.textContent="URLを発行する"};
  xhr.send(JSON.stringify({title:v.t,description:v.d,image:v.i,url:v.u,site:v.s,style:CS,color:CC.h}))
}
function CP(){var u=document.getElementById("ru").textContent;navigator.clipboard.writeText(u).then(function(){var b=document.querySelector(".copy-url-btn");b.textContent="コピーしました！";setTimeout(function(){b.textContent="URLをコピー"},1500)})}
document.querySelectorAll("#ti,#de,#ur,#im,#si").forEach(function(e){e.addEventListener("input",RP)});
BC();RP();
</script>
</body>
</html>
